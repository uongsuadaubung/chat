<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Vibrant Blue-Purple Gradient -->
    <linearGradient id="p2pGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Vibrant Pink-Orange Gradient -->
    <linearGradient id="p2pGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <!-- Soft Glass Shadows -->
    <filter id="glass1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4F46E5" flood-opacity="0.3"/>
    </filter>
    <filter id="glass2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#EC4899" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Left Chat Node (Sender) -->
  <g filter="url(#glass1)">
    <rect x="24" y="48" width="136" height="104" rx="32" fill="url(#p2pGrad1)"/>
    <path d="M48 152 Q 48 184 24 192 Q 48 192 64 152 Z" fill="#7C3AED"/>
  </g>
  
  <!-- Internal Signals (Left) -->
  <circle cx="72" cy="100" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="108" cy="100" r="10" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Right Chat Node (Receiver) -->
  <g filter="url(#glass2)">
    <rect x="96" y="96" width="136" height="104" rx="32" fill="url(#p2pGrad2)"/>
    <path d="M208 200 Q 208 232 232 240 Q 208 240 192 200 Z" fill="#F43F5E"/>
  </g>

  <!-- Internal Signals (Right) -->
  <circle cx="148" cy="148" r="10" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="184" cy="148" r="10" fill="#FFFFFF" fill-opacity="0.9"/>
  
  <!-- P2P Wave Link between peers -->
  <path d="M 108 100 Q 128 124 148 148" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-dasharray="4 8" opacity="0.6" />
</svg>